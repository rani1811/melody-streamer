version: "3.8"

services:
  # MySQL database
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: music_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # Backend service
  backend:
    build: ./backend
    container_name: backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: music_db
      DB_PORT: 3306
      PORT: 5000
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    networks:
      - app-network
    volumes:
      - ./backend/music:/app/music

  # Frontend service
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # Jenkins service
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"    # Host port 8090 maps to container 8080
      - "50000:50000"  # Jenkins agents
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # <-- host Docker access
      - /usr/bin/docker:/usr/bin/docker
    networks:
      - app-network

volumes:
  mysql_data:
  jenkins_home:

networks:
  app-network:
    driver: bridge

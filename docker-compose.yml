version: "3.8"

services:
  # MySQL database
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: music_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # Backend service
  backend:
    build: ./backend
    container_name: backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: music_db
      DB_PORT: 3306
      PORT: 5000
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    networks:
      - app-network
    volumes:
      - ./backend/music:/app/music

  # Frontend service
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
